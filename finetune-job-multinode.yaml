# 다중 노드 통신을 위한 헤드리스 서비스
apiVersion: v1
kind: Service
metadata:
  name: llama3-finetune-job-headless
spec:
  clusterIP: None # 헤드리스 서비스
  selector:
    job-name: llama3-finetune-job-multinode # 아래 Job의 파드와 연결

---

# 다중 노드 미세 조정 작업을 위한 Kubernetes Job
apiVersion: batch/v1
kind: Job
metadata:
  name: llama3-finetune-job-multinode
spec:
  completions: 2 # 2개의 파드가 모두 성공해야 Job이 완료됨
  parallelism: 2 # 2개의 파드를 동시에 실행
  completionMode: Indexed # 파드에 0, 1, ... 인덱스를 부여
  template:
    spec:
      serviceAccountName: llama3-finetuner-ksa
      restartPolicy: Never
      # subdomain 필수: 이 값이 있어야 파드별 DNS가 생성됨
      # 형식: {pod-name}.{subdomain}.{namespace}.svc.cluster.local
      subdomain: llama3-finetune-job-headless
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-h100-mega-80gb
      containers:
      - name: finetuner
        image: <YOUR_IMAGE_URI> # 🚨 push.sh로 빌드한 본인의 이미지 URI로 변경하세요.
        command:
        - "bash"
        - "-c"
        - |
          # MASTER_ADDR은 rank-0 파드의 FQDN으로 고정
          # Headless Service DNS는 모든 파드 IP를 반환하므로 불안정 → 파드별 DNS 명시
          # subdomain이 설정되어야 아래 DNS가 동작함
          export MASTER_ADDR="llama3-finetune-job-multinode-0.llama3-finetune-job-headless.default.svc.cluster.local"
          export MASTER_PORT="29500"
          export WORLD_SIZE="2"
          # JOB_COMPLETION_INDEX는 Indexed Job이 자동 주입 (별도 설정 불필요)
          export RANK="${JOB_COMPLETION_INDEX}"

          echo "Starting multi-node training..."
          echo "MASTER_ADDR: ${MASTER_ADDR}"
          echo "RANK: ${RANK}"
          echo "WORLD_SIZE: ${WORLD_SIZE}"

          torchrun \
            --nproc_per_node=8 \
            --nnodes=2 \
            --node_rank=${RANK} \
            --master_addr=${MASTER_ADDR} \
            --master_port=${MASTER_PORT} \
            /app/scripts/finetune.py
        env:
        - name: GCS_BUCKET_NAME
          value: "<YOUR_GCS_BUCKET_NAME>" # 🚨 본인의 GCS 버킷 이름으로 변경하세요.
        - name: NCCL_SOCKET_IFNAME
          value: "eth0"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-secret
              key: token
        resources:
          limits:
            nvidia.com/gpu: 8
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /tmp
          name: tmp
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 128Gi
      - name: tmp
        emptyDir: {}
      hostIPC: true
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
